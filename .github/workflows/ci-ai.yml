name: CI — AI Service (Python)

on:
  push:
    paths:
      - 'AI/**'
      - '.github/workflows/ci-ai.yml'
  pull_request:
    paths:
      - 'AI/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: AI
        run: pip install -r requirements.txt

      - name: Lint
        working-directory: AI
        run: python -m flake8 . --max-line-length=120

      - name: Run tests
        working-directory: AI
        run: python -m pytest tests/ -v --cov=. --cov-report=xml

      - name: Build Docker image
        run: |
          docker build -f AI/DOCKERFILE -t ai-governance/ai:${{ github.sha }} AI/
          docker tag ai-governance/ai:${{ github.sha }} ai-governance/ai:latest

      - name: Security scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ai-governance/ai:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Push to registry
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: |
          echo ${{ secrets.REGISTRY_PASSWORD }} | docker login ${{ secrets.REGISTRY_URL }} \
            -u ${{ secrets.REGISTRY_USER }} --password-stdin
          docker push ${{ secrets.REGISTRY_URL }}/ai-governance/ai:${{ github.sha }}
          docker push ${{ secrets.REGISTRY_URL }}/ai-governance/ai:latest
